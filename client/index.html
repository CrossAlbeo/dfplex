<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>dfplex (DF 53.x)</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div id="toolbar">
      <strong>dfplex</strong>
      <label>
        source
        <select id="source">
          <option value="mock">Mock</option>
          <option value="ws">WebSocket</option>
        </select>
      </label>
      <input id="wsurl" type="text" value="ws://localhost:8080/ws" size="28" />
      <label>nick <input id="nick" type="text" size="10" /></label>
      <button id="connect">Connect</button>
      <span id="status">—</span>
      <span class="help">L-drag designate · M-drag / WASD pan · wheel zoom · Q/E change z · 1–7 dig order · Esc close menu</span>
    </div>
    <canvas id="view"></canvas>
    <div id="bottom">
      <div id="orderbar" class="hidden"></div>
      <div id="menubar">
        <div class="menubox" id="box-designate"><span class="menubox-label">Designate</span></div>
        <div class="menubox" id="box-place"><span class="menubox-label">Place</span></div>
        <div class="menubox" id="box-inspect"><span class="menubox-label">Inspect</span></div>
      </div>
      <div id="hud">—</div>
    </div>
    <div id="chat">
      <div id="chathead"><span id="online">online: 0</span><span id="chattoggle">▾</span></div>
      <div id="chatlog"></div>
      <form id="chatform" autocomplete="off">
        <input id="chatinput" type="text" maxlength="500" placeholder="press Enter to chat…" />
      </form>
    </div>
    <script type="module" src="js/app.js"></script>
  </body>
</html>
