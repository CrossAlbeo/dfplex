<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>dfplex (DF 53.x)</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div id="toolbar">
      <strong>dfplex</strong>
      <label>
        source
        <select id="source">
          <option value="mock">Mock</option>
          <option value="ws">WebSocket</option>
        </select>
      </label>
      <input id="wsurl" type="text" value="ws://localhost:8080/ws" size="28" />
      <button id="connect">Connect</button>
      <span id="status">—</span>
      <label>
        designate
        <select id="digkind">
          <option value="dig">Dig</option>
          <option value="channel">Channel (↓)</option>
          <option value="upstair">Up stair (&lt;)</option>
          <option value="downstair">Down stair (&gt;)</option>
          <option value="updownstair">Up-down stair (X)</option>
          <option value="ramp">Ramp (▲)</option>
          <option value="remove">Remove</option>
        </select>
      </label>
      <span class="help">drag/WASD pan · wheel zoom · Q/E change z · shift-drag designate</span>
    </div>
    <canvas id="view"></canvas>
    <div id="hud">—</div>
    <script type="module" src="js/app.js"></script>
  </body>
</html>
