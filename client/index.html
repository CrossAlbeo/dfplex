<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>dfplex (DF 53.x)</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div id="toolbar">
      <strong>dfplex</strong>
      <label>
        source
        <select id="source">
          <option value="mock">Mock</option>
          <option value="ws">WebSocket</option>
        </select>
      </label>
      <input id="wsurl" type="text" value="ws://localhost:8080/ws" size="28" />
      <button id="connect">Connect</button>
      <span id="status">—</span>
      <span class="help">L-drag designate · M-drag / WASD pan · wheel zoom · Q/E change z · 1–7 dig order · Esc close menu</span>
    </div>
    <canvas id="view"></canvas>
    <div id="bottom">
      <div id="hud">—</div>
      <div id="orderbar"></div>
      <div id="menubar"></div>
    </div>
    <script type="module" src="js/app.js"></script>
  </body>
</html>
